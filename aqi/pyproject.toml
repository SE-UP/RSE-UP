[tool.black]
line-length = 79

[tool.isort]
profile = "black"

[tool.mypy]
strict = true
mypy_path = "src"
explicit_package_bases = true

[tool.flake8]
max-line-length = 79
extend-ignore = ["E203", "W503"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.coverage.run]
omit = ["src/__init__.py"]